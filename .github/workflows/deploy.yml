name: React App CI/CD with ArgoCD

on:
  push:
    branches: [ release ]
  pull_request:
    branches: [ release ]

env:
  AWS_REGION: ap-northeast-2                   # AWS 리전을 설정하세요
  ECR_REPOSITORY: 809691348554.dkr.ecr.ap-northeast-2.amazonaws.com/team03-fe-repository     # ECR 저장소 이름을 설정하세요
  EKS_CLUSTER_NAME: msa      # EKS 클러스터 이름을 설정하세요
  ARGOCD_APP_NAME: team03-fe        # ArgoCD 애플리케이션 이름을 설정하세요
  ARGOCD_SERVER: argocd-server.argocd        # ArgoCD 서버 주소를 설정하세요

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write    # GitHub OIDC 토큰에 필요한 권한

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build React application
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # 이미지 URI를 출력하여 다음 단계에서 사용
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Update Kubernetes config
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd-linux-amd64 https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          sudo install -m 555 argocd-linux-amd64 /usr/local/bin/argocd
          rm argocd-linux-amd64

      - name: Login to ArgoCD
        run: |
          argocd login ${{ env.ARGOCD_SERVER }} --username ${{ secrets.ARGOCD_USERNAME }} --password ${{ secrets.ARGOCD_PASSWORD }} --insecure

      - name: Update Deployment Image in ArgoCD
        run: |
          # 이미지 태그 업데이트
          argocd app set ${{ env.ARGOCD_APP_NAME }} -p image.tag=${{ github.sha }}
          
          # 변경 사항 동기화
          argocd app sync ${{ env.ARGOCD_APP_NAME }} --prune

      - name: Verify Deployment
        run: |
          argocd app wait ${{ env.ARGOCD_APP_NAME }} --health --timeout 300