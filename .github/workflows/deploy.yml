name: React App CI/CD with Infrastructure Update

on:
  push:
    branches: [ release ]
  pull_request:
    branches: [ release ]

env:
  AWS_REGION: ap-northeast-2
  ECR_REPOSITORY: 809691348554.dkr.ecr.ap-northeast-2.amazonaws.com/team03-fe-repository

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache-dependency-path: '**/package.json'

      - name: Install dependencies
        run: npm install

      - name: Build React application
        run: npm run build

      - name: Save short SHA
        id: short-sha
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_ENV

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag, and push image to Amazon ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{env.ECR_REPOSITORY}}:${{env.IMAGE_TAG}} -t ${{env.ECR_REPOSITORY}}:sha-$IMAGE_TAG .
          docker push ${{env.ECR_REPOSITORY}}:$IMAGE_TAG
          docker push ${{env.ECR_REPOSITORY}}:sha-$IMAGE_TAG
          echo "image=${{env.ECR_REPOSITORY}}:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # Infrastructure Repository Update Steps
      - name: Checkout infrastructure repository
        uses: actions/checkout@v3
        with:
          repository: TP1-OuterMSA/msa-infra  # Replace with your actual infra repo
          path: msa-infra
          token: ${{ secrets.GH_PAT }}  # You'll need to create this secret for repo access

      - name: Update image tag in Helm chart
        run: |
          cd msa-infra/charts/services/team03-fe  # Adjust path to your app's chart
          OLD_TAG=$(grep -oP 'tag: "\K[^"]+' values.yaml)
          sed -i "s/tag: \".*\"/tag: \"sha-${{ env.SHORT_SHA }}\"/g" values.yaml
          echo "Updated values.yaml content:"
          cat values.yaml
          if [ "$OLD_TAG" != "sha-${{ env.SHORT_SHA }}" ]; then
            echo "TAG_CHANGED=true" >> $GITHUB_ENV
            echo "OLD_TAG=$OLD_TAG" >> $GITHUB_ENV
          else
            echo "TAG_CHANGED=false" >> $GITHUB_ENV
          fi

      - name: Commit and push changes to infrastructure repo
        run: |
          cd msa-infra
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git diff-index --quiet HEAD || (git commit -m "Update team03-fe image tag to sha-${{ env.SHORT_SHA }}" && git push)