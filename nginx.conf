server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /team3 {
        alias /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        alias /usr/share/nginx/html/assets/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}